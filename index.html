  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true); 

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

// --- HIER STARTET DAS PLAY STORE WIDGET (Animiert + Menü-Logik) ---
    const playStoreHTML = `
      <style>
        /* Animation für das sanfte Pulsieren des Textes */
        @keyframes glowText {
          0% { opacity: 0.8; transform: scale(1); }
          50% { opacity: 1; transform: scale(1.08); text-shadow: 0 0 12px rgba(255, 255, 255, 0.9); }
          100% { opacity: 0.8; transform: scale(1); }
        }
        
        /* Container für das Widget (oben links fixiert) */
        #playstore-widget {
          position: absolute;
          top: 20px;
          left: 20px;
          z-index: 99999;
          display: flex;
          flex-direction: column;
          align-items: center;
          text-decoration: none;
          cursor: pointer;
        }

        /* Das Play Store Symbol mit Hover-Effekt */
        #playstore-widget img {
          width: 50px;
          height: 50px;
          filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6));
          transition: transform 0.2s ease;
        }
        #playstore-widget:hover img {
          transform: scale(1.1);
        }

        /* Der animierte Text unter dem Symbol */
        .playstore-text {
          margin-top: 8px;
          font-family: -apple-system, BlinkMacSystemFont, sans-serif;
          font-size: 13px;
          font-weight: bold;
          color: #ffffff;
          text-align: center;
          text-shadow: 0 2px 4px rgba(0,0,0,0.8);
          animation: glowText 2s infinite ease-in-out;
        }
      </style>

      <a href="https://play.google.com/store/apps/details?id=com.dreidimensional.schach" target="_blank" id="playstore-widget">
        <img src="https://upload.wikimedia.org/wikipedia/commons/d/d0/Google_Play_Arrow_logo.svg" alt="Play Store">
        <div class="playstore-text">Jetzt auf<br>Play Store!</div>
      </a>

      <script>
        // Logik zum Ausblenden im Spiel
        document.addEventListener('mousedown', function(e) {
          const widget = document.getElementById('playstore-widget');
          if (!widget) return;
          
          // Wenn der Spieler auf das Schachbrett (canvas) oder einen Ingame-Button klickt,
          // gehen wir davon aus, dass das Spiel läuft -> Widget verstecken.
          if (e.target.tagName.toLowerCase() === 'canvas') {
            widget.style.display = 'none';
          }
        });
      </` + `script>
    `;
    
    // Fügt das Widget vor dem schließenden Body-Tag ein
    template = template.replace('</body>', playStoreHTML + '</body>');
    // --- ENDE ---

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

rap:pretty}\n  .lv-go{font-size:18px;color:var(--muted);flex:none}\n\n  .lessonbar{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-12px);z-index:30;\n    display:none;align-items:center;gap:12px;max-width:min(92vw,560px);padding:10px 12px 10px 14px;\n    background:var(--glass2);backdrop-filter:blur(18px) saturate(160%);-webkit-backdrop-filter:blur(18px) saturate(160%);\n    border:.5px solid var(--line);border-radius:15px;box-shadow:0 12px 36px rgba(0,0,0,.45);opacity:0;transition:.3s}\n  .lessonbar.show{display:flex;opacity:1;transform:translateX(-50%) translateY(0)}\n  .lb-exit{width:30px;height:30px;flex:none;border-radius:9px;border:.5px solid var(--line);background:rgba(255,255,255,.06);\n    color:var(--text);font-size:12px;cursor:pointer}\n  .lb-exit:hover{background:rgba(255,255,255,.12)}\n  .lb-text{display:flex;flex-direction:column;gap:2px;min-width:0}\n  .lb-text b{font-family:var(--disp);font-size:13.5px;line-height:1.2}\n  .lb-text span{font-size:12px;color:var(--muted);line-height:1.4;text-wrap:pretty}\n  .lb-skip{flex:none;font-family:var(--disp);font-weight:600;font-size:12.5px;color:#0a0a10;\n    background:var(--cyan);border:0;border-radius:10px;padding:9px 14px;cursor:pointer}\n\n  .lessondone{position:fixed;inset:0;z-index:88;display:none;align-items:center;justify-content:center;padding:20px;\n    background:radial-gradient(circle at center,rgba(8,16,12,.5),rgba(4,6,10,.84));\n    backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px)}\n  .lessondone.show{display:flex;animation:fade .35s}\n  .ld-card{text-align:center;padding:30px 32px;border-radius:22px;background:var(--glass2);border:.5px solid var(--line);\n    box-shadow:0 20px 60px rgba(0,0,0,.6);animation:menuUp .45s cubic-bezier(.2,.7,.25,1) both}\n  .ld-check{width:64px;height:64px;margin:0 auto 14px;border-radius:50%;display:grid;place-items:center;font-size:32px;\n    color:#06120b;background:linear-gradient(180deg,#2fe57a,#16b85f);box-shadow:0 0 28px rgb ranslateX(360%)}}\n  <\u002Fstyle>\n\n  \n  <canvas id=\"scene\"><\u002Fcanvas>\n\n  <div class=\"splash\" id=\"splash\">\n    <div class=\"splash-mark\">\n      <span class=\"sk sk1\">♚<\u002Fspan><span class=\"sk sk2\">♝<\u002Fspan><span class=\"sk sk3\">♞<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"splash-title\">TRIDIMENSIONAL<\u002Fdiv>\n    <div class=\"splash-bar\"><span><\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"topbar\">\n    <div class=\"tools tools-left\">\n      <button class=\"tbtn\" id=\"btnMenu\" data-i18n-title=\"tip_menu\" title=\"Menü\">☰<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"tools\">\n      <button class=\"tbtn\" id=\"btnUndo\" data-i18n-title=\"tip_undo\" title=\"Zurück\">↶<\u002Fbutton>\n      <button class=\"tbtn\" id=\"btnRedo\" data-i18n-title=\"tip_redo\" title=\"Vor\">↷<\u002Fbutton>\n      <button class=\"tbtn\" id=\"btnGear\" data-i18n-title=\"settings\" title=\"Einstellungen\">⚙<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"turnwrap\">\n    <div class=\"turnpill\"><span class=\"dot white\" id=\"turnDot\"><\u002Fspan><span id=\"turnText\">Weiß am Zug<\u002Fspan><\u002Fdiv>\n    <div class=\"checkbadge\" id=\"checkBadge\" data-i18n=\"check\">Schach<\u002Fdiv>\n    <div class=\"clocks\" id=\"clocks\" style=\"display:none\">\n      <div class=\"clock white\" id=\"clockWhite\"><span class=\"cdot white\"><\u002Fspan><b id=\"timeWhite\">5:00<\u002Fb><\u002Fdiv>\n      <div class=\"clock black\" id=\"clockBlack\"><span class=\"cdot black\"><\u002Fspan><b id=\"timeBlack\">5:00<\u002Fb><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"hint\" id=\"hint\" data-i18n=\"hint\">Tippe eine Figur, dann ein leuchtendes Feld · ziehen zum Drehen · zwei Finger zum Zoomen<\u002Fdiv>\n\n  <button class=\"recenter-btn\" id=\"btnRecenter\" data-i18n-title=\"tip_center\" title=\"Zentrieren\" aria-label=\"Zentrieren\">⊙<\u002Fbutton>\n  <button class=\"resign-btn\" id=\"btnResign\" data-i18n=\"resign_btn\">A
