  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"72bcc846-2c25-4d1d-9dec-06dd9c45c29a\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"c4847034-467d-4937-8080-dc1645ef071c\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"1b66cbe4-5567-4a86-b2e7-8f260410d2ea\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root{\n    --accent:#ff2e9b; --cyan:#35e6ff; --gold:#ffd23a;\n    --text:#eef0f6; --muted:rgba(238,240,246,.62);\n    --glass:rgba(17,19,30,.55); --glass2:rgba(12,14,22,.74);\n    --line:rgba(255,255,255,.13);\n    --disp:'Space Grotesk',system-ui,sans-serif;\n    --body:ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif;\n  }\n  *{box-sizing:border-box}\n  html,body{margin:0;height:100%;overflow:hidden;background:#05060b;color:var(--text);\n    font-family:var(--body);-webkit-tap-highlight-color:transparent}\n  #scene{position:fixed;inset:0;width:100%;height:100%;display:block;touch-action:none}\n\n  .recenter-btn{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) scale(.6);\n    width:46px;height:46px;border-radius:50%;border:.5px solid var(--line);\n    background:var(--glass2);backdrop-filter:blur(16px) saturate(150%);\n    -webkit-backdrop-filter:blur(16px) saturate(150%);color:var(--cyan);font-size:20px;\n    display:grid;place-items:center;cursor:pointer;z-index:22;opacity:0;pointer-events:none;\n    transition:opacity .25s, transform .25s;box-shadow:0 8px 24px rgba(0,0,0,.4)}\n  .recenter-btn.show{opacity:1;transform:translateX(-50%) scale(1);pointer-events:auto}\n  .recenter-btn:active{transform:translateX(-50%) scale(.9)}\n\n  /* ---------- top bar ---------- */\n  .topbar{position:fixed;top:0;left:0;right:0;display:flex;align-items:flex-start;\n    justify-content:space-between;padding:14px;gap:12px;pointer-events:none;z-index:20}\n  .brand{display:flex;align-items:center;gap:9px;pointer-events:auto;\n    padding:9px 13px;background:var(--glass);backdrop-filter:blur(16px) saturate(150%);\n    -webkit-backdrop-filter:blur(16px) saturate(150%);border:.5px solid var(--line);border-radius:12px}\n  .brand .b-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);\n    box-shadow:0 0 12px var(--accent)}\n  .brand-name{font-family:var(--disp);font-size:12px;font-weight:600;letter-spacing:.04em;\n    text-transform:none;white-space:nowrap;color:var(--text)}\n\n  .tools{display:flex;gap:8px;pointer-events:auto}\n  .tbtn{width:44px;height:44px;border-radius:12px;border:.5px solid var(--line);\n    background:var(--glass);backdrop-filter:blur(16px) saturate(150%);\n    -webkit-backdrop-filter:blur(16px) saturate(150%);color:var(--text);\n    font-size:18px;display:grid;place-items:center;cursor:pointer;transition:.18s;line-height:1}\n  .tbtn:hover{background:var(--glass2);transform:translateY(-1px)}\n  .tbtn:active{transform:translateY(0) scale(.95)}\n  .tbtn.on{color:var(--cyan);border-color:rgba(53,230,255,.5);box-shadow:0 0 14px rgba(53,230,255,.3)}\n  .tbtn.disabled{opacity:.32;pointer-events:none}\n  .tools-left{position:relative}\n  .sheet.hidden{display:none}\n\n  /* ---------- turn pill ---------- */\n  .turnwrap{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:19;\n    display:flex;flex-direction:column;align-items:center;gap:7px;pointer-events:none;transition:opacity .25s, transform .25s}\n  body.reviewing .turnwrap{opacity:0;transform:translateX(-50%) translateY(-14px);pointer-events:none}\n  .turnpill{display:flex;align-items:center;gap:11px;padding:8px 18px 8px 11px;white-space:nowrap;\n    background:linear-gradient(180deg,rgba(28,29,40,.82),rgba(18,19,28,.82));backdrop-filter:blur(18px) saturate(160%);\n    -webkit-backdrop-filter:blur(18px) saturate(160%);border:.5px solid rgba(255,255,255,.14);\n    border-radius:999px;font-family:var(--disp);font-weight:600;font-size:13.5px;letter-spacing:.02em;\n    box-shadow:0 12px 34px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.08);transition:box-shadow .3s}\n  .dot{width:16px;height:16px;border-radius:50%;border:1.5px solid rgba(255,255,255,.32);\n    box-shadow:inset 0 1px 2px rgba(255,255,255,.4),inset 0 -2px 3px rgba(0,0,0,.3)}\n  .dot.white{background:var(--pcw,#ece9e3)}\n  .dot.black{background:var(--pcb,#16171c);border-color:rgba(255,255,255,.45)}\n  .turnpill.turn-white{box-shadow:0 12px 34px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.08),0 0 0 1px rgba(255,255,255,.4),0 0 18px rgba(255,255,255,.22)}\n  .turnpill.turn-black{box-shadow:0 12px 34px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.08),0 0 0 1px var(--accent),0 0 20px rgba(255,46,155,.4)}\n  .checkbadge{display:none;padding:4px 12px;border-radius:999px;font-size:11px;font-weight:700;\n    letter-spacing:.14em;text-transform:uppercase;color:#fff;background:var(--accent);\n    box-shadow:0 0 18px rgba(255,46,155,.6);animation:pop .3s}\n  .checkbadge.show{display:block}\n  @keyframes pop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}\n\n  /* ---------- clocks ---------- */\n  .clocks{display:flex;gap:8px}\n  .clock{display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:11px;\n    background:var(--glass2);backdrop-filter:blur(16px) saturate(150%);\n    -webkit-backdrop-filter:blur(16px) saturate(150%);border:.5px solid var(--line);\n    font-family:var(--disp);font-weight:700;font-size:16px;font-variant-numeric:tabular-nums;\n    letter-spacing:.02em;opacity:.5;transition:.2s}\n  .clock.active{opacity:1;border-color:rgba(255,255,255,.35);box-shadow:0 6px 20px rgba(0,0,0,.4)}\n  .clock.white.active{box-shadow:0 0 0 1px rgba(255,255,255,.4),0 6px 20px rgba(0,0,0,.4)}\n  .clock.black.active{box-shadow:0 0 0 1px var(--accent),0 6px 20px rgba(255,46,155,.3)}\n  .clock.low b{color:#ff5a7a}\n  .clock .cdot{width:13px;height:13px;border-radius:50%;border:1.5px solid rgba(255,255,255,.3)}\n  .clock .cdot.white{background:var(--pcw,#ece9e3)}\n  .clock .cdot.black{background:var(--pcb,#16171c);border-color:rgba(255,255,255,.45)}\n\n  /* ---------- hint ---------- */\n  .hint{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);z-index:18;\n    padding:8px 15px;border-radius:999px;background:var(--glass);border:.5px solid var(--line);\n    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);font-size:12px;color:var(--muted);\n    pointer-events:none;transition:opacity .6s, transform .6s;text-align:center;max-width:88vw}\n  .hint.gone{opacity:0;transform:translateX(-50%) translateY(10px)}\n\n  /* ---------- bottom sheet ---------- */\n  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:21;\n    background:var(--glass2);backdrop-filter:blur(22px) saturate(160%);\n    -webkit-backdrop-filter:blur(22px) saturate(160%);border-top:.5px solid var(--line);\n    border-radius:18px 18px 0 0;box-shadow:0 -10px 40px rgba(0,0,0,.5);\n    transform:translateY(calc(100% - 60px));transition:transform .32s cubic-bezier(.32,.72,.3,1);\n    padding-bottom:env(safe-area-inset-bottom)}\n  .sheet.open{transform:translateY(0)}\n  .sheet-handle{display:flex;align-items:center;justify-content:space-between;\n    padding:12px 16px;cursor:pointer;height:60px}\n  .sheet-handle .grab{position:absolute;left:50%;top:7px;transform:translateX(-50%);\n    width:38px;height:4px;border-radius:2px;background:rgba(255,255,255,.25)}\n  .sheet-handle .lbl{font-family:var(--disp);font-weight:600;font-size:13px;letter-spacing:.04em}\n  .sheet-handle .meta{font-size:11.5px;color:var(--muted)}\n  .sheet-body{padding:2px 16px 20px;max-height:46vh;overflow:hidden;display:flex;flex-direction:column;gap:14px}\n\n  .caprow{display:flex;flex-direction:column;gap:5px}\n  .caprow .ttl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}\n  .captray{display:flex;flex-wrap:wrap;gap:2px;min-height:26px;align-items:center;\n    background:rgba(255,255,255,.04);border:.5px solid var(--line);border-radius:10px;padding:5px 8px}\n  .cap{font-size:21px;line-height:1}\n  .cap.white{color:#f2efe9;text-shadow:0 1px 2px rgba(0,0,0,.5)}\n  .cap.black{color:#9aa0b2}\n  .capempty{color:rgba(255,255,255,.2);font-size:14px}\n\n  .histwrap .ttl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}\n  .histlist{display:flex;flex-direction:column;gap:1px;max-height:22vh;overflow-y:auto;\n    font-variant-numeric:tabular-nums;scrollbar-width:thin}\n  .hrow{display:grid;grid-template-columns:26px 24px 1fr;align-items:center;gap:8px;\n    padding:5px 8px;border-radius:8px;font-size:12.5px}\n  .hrow:nth-child(odd){background:rgba(255,255,255,.035)}\n  .hn{color:var(--muted);font-size:11px}\n  .hg{font-size:18px;line-height:1}\n  .hg.white{color:#f2efe9}.hg.black{color:#9aa0b2}\n  .ht{color:var(--text);letter-spacing:.02em}\n\n  /* ---------- win banner ---------- */\n  .promo-overlay{position:fixed;left:0;right:0;bottom:0;z-index:60;display:none;justify-content:center;\n    pointer-events:none;padding-bottom:84px}\n  .promo-overlay.show{display:flex}\n  .promo-card{background:rgba(19
